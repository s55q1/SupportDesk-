<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام دعم فني - نسخة تشغيل مباشرة</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; direction: rtl; background: #eef3f8; }
    .container { max-width: 960px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; }
    .tabs button { flex: 1; min-width: 140px; padding: 12px 16px; border-radius: 10px; border: 1px solid #3498db; background: #fff; color: #3498db; cursor: pointer; }
    .tabs button.active { background: #3498db; color: #fff; }
    .panel { display: none; margin-top: 20px; }
    .panel.active { display: block; }
    label { display: block; margin: 16px 0 8px; font-weight: bold; }
    select, input[type=text], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
    button.action { margin-top: 12px; padding: 12px 18px; border: none; border-radius: 10px; background: #3498db; color: #fff; cursor: pointer; font-size: 15px; }
    .card { background: #f8fbff; border: 1px solid #dce7f1; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .card strong { display: block; margin-bottom: 8px; }
    .note { padding: 12px 16px; background: #eef6ff; border: 1px solid #cce3ff; border-radius: 10px; margin-bottom: 18px; }
    .grid { display: grid; gap: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>نظام دعم فني - يعمل مباشرة في المتصفح</h1>
    <div class="note">يمكنك فتح هذا الملف مباشرة في المتصفح بدون خادم PHP. لكنه نسخة عرضية للاستخدام فوراً.</div>
    <div class="tabs">
      <button id="tabEmployee" class="active">واجهة الموظف</button>
      <button id="tabTechnician">لوحة الفني</button>
    </div>

    <section id="employeePanel" class="panel active">
      <h2>واجهة الموظف</h2>
      <label for="employeeCategory">اختر نوع العطل</label>
      <select id="employeeCategory"></select>
      <label for="employeeKeyword">كلمة مفتاحية للبحث في الحلول السريعة</label>
      <input type="text" id="employeeKeyword" placeholder="اكتب كلمة مثل: شبكة، بطء، طباعة" />
      <button class="action" id="searchQuickButton">عرض الحلول السريعة</button>

      <div id="quickSolutions" class="grid"></div>

      <h3>فتح تذكرة جديدة</h3>
      <label for="ticketTitle">عنوان المشكلة</label>
      <input type="text" id="ticketTitle" placeholder="مثال: لا يوجد اتصال بالإنترنت" />
      <label for="ticketDescription">وصف المشكلة</label>
      <textarea id="ticketDescription" rows="4" placeholder="صف المشكلة بالتفصيل"></textarea>
      <button class="action" id="openTicketButton">فتح التذكرة</button>
      <div id="employeeMessage" class="note" style="display:none;"></div>
    </section>

    <section id="technicianPanel" class="panel">
      <h2>لوحة الفني</h2>
      <div class="note">التذاكر تحفظ محلياً في المتصفح ويمكن مراجعتها مباشرة.</div>
      <div id="ticketList" class="grid"></div>
      <div id="ticketDetails"></div>
    </section>
  </div>

  <script>
    const categories = [
      'جهاز لا يشغل',
      'بطء النظام',
      'عدم الاتصال بالشبكة',
      'طباعة لا تعمل',
      'شاشة زرقاء'
    ];

    const solutions = [
      { category: 'جهاز لا يشغل', description: 'تحقق من كابل الطاقة وأعد توصيله قبل تشغيل الجهاز.' , keywords: 'طاقة كابل تشغيل' },
      { category: 'بطء النظام', description: 'أغلق البرامج غير الضرورية وأعد تشغيل الجهاز لتحرير الموارد.' , keywords: 'بطء ذاكرة CPU' },
      { category: 'عدم الاتصال بالشبكة', description: 'تحقق من إعدادات الواي فاي وأعد تشغيل الراوتر.' , keywords: 'شبكة إنترنت واي فاي' },
      { category: 'طباعة لا تعمل', description: 'تأكد من الورق والحبر وأعد تشغيل الطابعة.' , keywords: 'طابعة ورق حبر خطأ' },
      { category: 'شاشة زرقاء', description: 'سجل رمز الخطأ ثم قم بتحديث تعريفات الجهاز.' , keywords: 'شاشة زرقاء خطأ' }
    ];

    const storageKey = 'helpdesk_demo_tickets';
    const ticketListElement = document.getElementById('ticketList');
    const ticketDetailsElement = document.getElementById('ticketDetails');
    const quickSolutionsElement = document.getElementById('quickSolutions');
    const employeeMessageElement = document.getElementById('employeeMessage');

    let tickets = JSON.parse(localStorage.getItem(storageKey) || '[]');
    let selectedTicketId = null;

    const employeeCategory = document.getElementById('employeeCategory');
    categories.forEach(category => {
      const option = document.createElement('option');
      option.value = category;
      option.textContent = category;
      employeeCategory.appendChild(option);
    });

    function saveTickets() {
      localStorage.setItem(storageKey, JSON.stringify(tickets));
    }

    function showMessage(message, isError = false) {
      employeeMessageElement.style.display = 'block';
      employeeMessageElement.textContent = message;
      employeeMessageElement.style.background = isError ? '#fdecea' : '#e8f5e9';
      employeeMessageElement.style.borderColor = isError ? '#f3b3ac' : '#b8dfb1';
    }

    function clearMessage() {
      employeeMessageElement.style.display = 'none';
    }

    function findQuickSolutions(category, keyword) {
      const term = keyword.trim();
      return solutions.filter(item => {
        const inCategory = item.category === category;
        if (!inCategory) return false;
        if (term === '') return true;
        const lower = term.toLowerCase();
        return item.description.toLowerCase().includes(lower) || item.keywords.toLowerCase().includes(lower);
      });
    }

    function renderQuickSolutions(items) {
      quickSolutionsElement.innerHTML = '';
      if (!items.length) {
        quickSolutionsElement.innerHTML = '<div class="card">لا توجد حلول مطابقة.</div>';
        return;
      }
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<strong>الحل:</strong><p>${item.description}</p><small>كلمات مفتاحية: ${item.keywords}</small>`;
        quickSolutionsElement.appendChild(card);
      });
    }

    function createTicket(title, description, category) {
      const newTicket = {
        id: Date.now(),
        category,
        title,
        description,
        status: 'open',
        createdAt: new Date().toLocaleString('ar-EG')
      };
      tickets.unshift(newTicket);
      saveTickets();
      renderTickets();
      showMessage('تم فتح التذكرة بنجاح.', false);
      return newTicket;
    }

    function renderTickets() {
      ticketListElement.innerHTML = '';
      const openTickets = tickets.filter(t => t.status === 'open');
      if (!openTickets.length) {
        ticketListElement.innerHTML = '<div class="card">لا توجد تذاكر مفتوحة حالياً.</div>';
        ticketDetailsElement.innerHTML = '';
        return;
      }
      openTickets.forEach(ticket => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <strong>رقم التذكرة:</strong> ${ticket.id}<br>
          <strong>الفئة:</strong> ${ticket.category}<br>
          <strong>العنوان:</strong> ${ticket.title}<br>
          <strong>الوصف:</strong> ${ticket.description}<br>
          <button class="action" onclick="showTicketDetails(${ticket.id})">عرض الاقتراحات</button>
        `;
        ticketListElement.appendChild(card);
      });
      if (selectedTicketId) {
        showTicketDetails(selectedTicketId);
      }
    }

    function matchSuggestions(ticket) {
      const text = `${ticket.title} ${ticket.description}`.toLowerCase();
      return solutions.filter(solution => {
        return solution.category === ticket.category && (
          text.includes(solution.description.toLowerCase()) ||
          solution.keywords.toLowerCase().split(' ').some(word => text.includes(word))
        );
      });
    }

    function showTicketDetails(id) {
      selectedTicketId = id;
      const ticket = tickets.find(item => item.id === id);
      if (!ticket) return;
      const suggestions = matchSuggestions(ticket);
      ticketDetailsElement.innerHTML = `
        <h3>بيانات التذكرة</h3>
        <div class="card">
          <strong>رقم التذكرة:</strong> ${ticket.id}<br>
          <strong>الفئة:</strong> ${ticket.category}<br>
          <strong>العنوان:</strong> ${ticket.title}<br>
          <strong>الوصف:</strong> ${ticket.description}<br>
          <strong>الحالة:</strong> ${ticket.status}<br>
          <strong>تاريخ الإنشاء:</strong> ${ticket.createdAt}
        </div>
        <h3>الحلول المقترحة</h3>
      `;
      if (!suggestions.length) {
        ticketDetailsElement.innerHTML += '<div class="card">لا توجد اقتراحات مشابهة.</div>';
      } else {
        suggestions.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <strong>الحل المقترح:</strong>
            <p>${item.description}</p>
            <small>كلمات مفتاحية: ${item.keywords}</small>
          `;
          ticketDetailsElement.appendChild(card);
        });
      }
    }

    document.getElementById('searchQuickButton').addEventListener('click', () => {
      clearMessage();
      const category = employeeCategory.value;
      const keyword = document.getElementById('employeeKeyword').value;
      if (!category) {
        showMessage('اختر فئة العطل أولاً.', true);
        return;
      }
      const results = findQuickSolutions(category, keyword);
      renderQuickSolutions(results);
    });

    document.getElementById('openTicketButton').addEventListener('click', () => {
      clearMessage();
      const category = employeeCategory.value;
      const title = document.getElementById('ticketTitle').value.trim();
      const description = document.getElementById('ticketDescription').value.trim();
      if (!category || !title || !description) {
        showMessage('يرجى تعبئة جميع الحقول لفتح التذكرة.', true);
        return;
      }
      createTicket(title, description, category);
      document.getElementById('ticketTitle').value = '';
      document.getElementById('ticketDescription').value = '';
      renderTickets();
    });

    document.getElementById('tabEmployee').addEventListener('click', () => {
      document.getElementById('tabEmployee').classList.add('active');
      document.getElementById('tabTechnician').classList.remove('active');
      document.getElementById('employeePanel').classList.add('active');
      document.getElementById('technicianPanel').classList.remove('active');
    });

    document.getElementById('tabTechnician').addEventListener('click', () => {
      document.getElementById('tabTechnician').classList.add('active');
      document.getElementById('tabEmployee').classList.remove('active');
      document.getElementById('technicianPanel').classList.add('active');
      document.getElementById('employeePanel').classList.remove('active');
      renderTickets();
    });

    window.showTicketDetails = showTicketDetails;
    renderQuickSolutions([]);
    renderTickets();
  </script>
</body>
</html>
